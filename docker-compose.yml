
services:

  db:
    image: postgres:15
    container_name: consent_db
    restart: always
    environment:
      POSTGRES_DB: consent_db
      POSTGRES_USER: consent_user
      POSTGRES_PASSWORD: consent_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: consent_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: consent_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@internship.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - db

volumes:
  postgres_data:
  redis_data: